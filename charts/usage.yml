apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
 name: neuvectorusagerecords.neuvector.com
spec:
 group: neuvector.com
 names:
   plural: neuvectorusagerecords
   singular: neuvectorusagerecord
   kind: NeuvectorUsageRecord
   shortNames:
   - nur
 scope: Cluster
 versions:
   - name: v1
     served: true
     storage: true
     schema:
       openAPIV3Schema:
         type: object
         properties:
           usage:
             type: integer
           extensions:
             type: string
           version:
             type: string
           timestamp:
             type: string
         required:
           - usage
           - version
           - timestamp
