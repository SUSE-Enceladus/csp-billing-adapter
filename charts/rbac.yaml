apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nv-csp-billing-adapter-cluster-role
rules:
- apiGroups:
  - susecloud.net
  resources:
  - settings
  resourceNames:
  - server-url
  - server-version
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apiregistration.k8s.io
  resources:
  - apiservices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nv-csp-billing-adapter-crb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nv-csp-billing-adapter-cluster-role
subjects:
  - kind: ServiceAccount
    name: nv-csp-billing-adapter
    namespace: neuvector-csp-billing-adapter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nv-csp-billing-adapter-role
  namespace: neuvector-csp-billing-adapter
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - csp-adapter-cache
  verbs:
  - "*"
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
- apiGroups:
  - ""
  resources:
  - configmaps
  resourceNames:
  - csp-config
  verbs:
  - "*"
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nv-csp-billing-adapter-binding
  namespace: neuvector-csp-billing-adapter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nv-csp-billing-adapter-role
subjects:
  - kind: ServiceAccount
    name: nv-csp-billing-adapter
    namespace: neuvector-csp-billing-adapter
