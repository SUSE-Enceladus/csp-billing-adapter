apiVersion: v1
kind: Namespace
metadata:
  name: neuvector-csp-billing-adapter
  labels:
    name: neuvector-csp-billing-adapter
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: csp-billing-adapter-account
  namespace: neuvector-csp-billing-adapter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: neuvector-csp-billing-adapter-cluster-role
rules:
- apiGroups:
  - susecloud.net
  resources:
  - usagerecords
  resourceNames:
  - neuvector-usage
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apiregistration.k8s.io
  resources:
  - apiservices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: neuvector-csp-billing-adapter-crb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: neuvector-csp-adapter-cluster-role
subjects:
  - kind: ServiceAccount
    name: csp-billing-adapter-account
    namespace: neuvector-csp-billing-adapter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: csp-billing-adapter-role
  namespace: neuvector-csp-billing-adapter
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - csp-adapter-cache
  verbs:
  - "*"
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
- apiGroups:
  - ""
  resources:
  - configmaps
  resourceNames:
  - csp-config
  verbs:
  - "*"
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: csp-billing-adapter-binding
  namespace: neuvector-csp-billing-adapter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: csp-billing-adapter-role
subjects:
  - kind: ServiceAccount
    name: csp-billing-adapter-account
    namespace: neuvector-csp-billing-adapter
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
 name: usagerecords.susecloud.net
spec:
 group: susecloud.net
 names:
   plural: usagerecords
   singular: usagerecord
   kind: UsageRecord
   shortNames:
   - ur
 scope: Cluster
 versions:
   - name: v1
     served: true
     storage: true
     schema:
       openAPIV3Schema:
         type: object
         properties:
           value:
             type: integer
           version:
             type: string
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: csp-billing-adapter
  namespace: neuvector-csp-billing-adapter
spec:
  selector:
    matchLabels:
      app: csp-billing-adapter
  template:
    metadata:
      labels:
        app: csp-billing-adapter
    spec:
      containers:
      - env:
        - name: CSP_ADAPTER_DEBUG
          value: "True"
        - name: K8S_OUTPUT_CONFIGMAP
          value: 'csp-config'
        - name: K8S_CACHE_SECRET
          value: 'csp-adapter-cache'
        image: registry.opensuse.org/home/seanmarlow/containers/containers/cloud/tools/csp-adapter-container:latest
        name: csp-billing-adapter
        imagePullPolicy: "IfNotPresent"
      serviceAccountName: csp-billing-adapter-account
